<!DOCTYPE html><html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ahmed - Eid Mubarak</title><style>
body{
  margin:0;
  padding:20px;
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background: linear-gradient(45deg,#0f2027,#2c5364);
  color:white;
  font-family: Arial;
  text-align:center;
}

/* container */
.box{
  max-width:350px;
}

/* text */
h1{
  font-size:26px;
  animation: glow 1.5s infinite alternate;
}
p{font-size:16px;}
h2{font-size:18px;}

/* glow */
@keyframes glow{
  from{ text-shadow:0 0 10px #fff;}
  to{ text-shadow:0 0 25px gold;}
}

/* moon */
.moon{
  width:80px;
  height:80px;
  background:white;
  border-radius:50%;
  position:absolute;
  top:10%;
  right:15%;
  box-shadow:0 0 25px white;
}
</style></head><body><div class="moon"></div><div class="box">
<h1>🌙 Eid ul Fitr Mubarak 🌙</h1>
<p>May Allah bless you with happiness,<br>peace and success.</p>
<h2>– From Ahmed 💖 AND SHAIKH FAMILY</h2>
</div></body>
</html>
